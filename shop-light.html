<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madame D Photography | Bold Editorial & Creative Portrait Photography</title>
    <meta name="description" content="Madame D Photography specializes in bold editorial portraits, steampunk, fantasy, and conceptual photography. Featured in ENVYD Magazine. Book your creative session today and bring your imaginative vision to life.">
    <meta name="keywords" content="editorial photography, creative portraits, steampunk photography, fantasy photography, conceptual photography, Madame D Photography, artistic portraits, magazine photography">
    <link rel="canonical" href="https://madamedphotography.com/">
    <meta name="last-modified" content="2025-01-01">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Madame D Photography | Bold Editorial & Creative Portraits">
    <meta property="og:description" content="Where imagination meets the lens. Specializing in editorial, steampunk, and fantasy photography.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://madamedphotography.com/">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Madame D Photography | Bold Editorial & Creative Portraits">
    <meta name="twitter:description" content="Where imagination meets the lens. Specializing in editorial, steampunk, and fantasy photography.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cinzel:wght@400..900&family=Montserrat:ital,wght@0,300;0,400;0,500;1,300&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        display: ['Cinzel', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                        script: ['Great Vibes', 'cursive'],
                    },
                    colors: {
                        'brand-orange': '#b85c2a',
                        'brand-teal': '#1a7a7a',
                        'cream': '#f5ede3',
                        'cream-light': '#fdf8f3',
                        'border-tan': '#d9c9b5',
                    }
                }
            }
        }
    </script>
    <style>
        .font-script { font-family: 'Great Vibes', cursive; }
        .font-display { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="bg-cream font-sans min-h-screen">
    <div id="root">
        <!-- Header -->
        <header class="bg-white border-b border-border-tan relative z-40">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <a class="font-display text-2xl text-[#1a1a1a] hover:text-brand-orange transition-colors duration-300 cursor-pointer whitespace-nowrap" href="index.html">MADAME D</a>
                    <nav class="hidden md:flex items-center gap-8">
                        <a class="text-[#555] hover:text-brand-teal transition-colors duration-300 text-sm uppercase tracking-wider cursor-pointer whitespace-nowrap" href="index.html">Home</a>
                        <a class="text-brand-teal font-semibold text-sm uppercase tracking-wider cursor-pointer whitespace-nowrap" href="shop-light.html">Shop</a>
                    </nav>
                    <div class="flex items-center gap-2 sm:gap-4">
                        <a title="Switch to Dark Mode" href="shop-dark.html" class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-full border border-[#ccc] bg-white hover:border-brand-teal transition-all duration-300 text-sm text-[#555] hover:text-brand-teal whitespace-nowrap cursor-pointer shadow-sm">
                            <i class="ri-moon-line text-base"></i>
                            <span class="hidden xs:inline">Dark</span>
                        </a>
                        <button class="relative w-10 h-10 flex items-center justify-center text-[#1a1a1a] hover:text-brand-orange transition-colors duration-300 cursor-pointer">
                            <i class="ri-shopping-cart-line text-2xl"></i>
                        </button>
                        <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center w-10 h-10 text-[#1a1a1a] cursor-pointer" aria-label="Toggle Menu">
                            <i class="ri-menu-line text-2xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white transform translate-x-full transition-transform duration-300 md:hidden">
            <div class="flex flex-col h-full p-8">
                <div class="flex items-center justify-between mb-12">
                    <span class="font-display text-2xl tracking-wider text-[#1a1a1a]">MADAME D</span>
                    <button id="close-menu" class="w-10 h-10 flex items-center justify-center text-[#1a1a1a] cursor-pointer">
                        <i class="ri-close-line text-2xl"></i>
                    </button>
                </div>
                <nav class="flex flex-col gap-6">
                    <a class="text-2xl font-serif text-[#1a1a1a] hover:text-brand-teal transition-colors" href="index.html">Home</a>
                    <a class="text-2xl font-serif text-[#1a1a1a] hover:text-brand-teal transition-colors" href="shop-light.html">Shop</a>
                    <a class="text-2xl font-serif text-[#1a1a1a] hover:text-brand-teal transition-colors" href="index.html#portfolio">Portfolio</a>
                    <a class="text-2xl font-serif text-[#1a1a1a] hover:text-brand-teal transition-colors" href="index.html#services">Services</a>
                    <a class="text-2xl font-serif text-[#1a1a1a] hover:text-brand-teal transition-colors" href="index.html#contact">Contact</a>
                </nav>
            </div>
        </div>

        <!-- Hero Section -->
        <section class="py-16 bg-gradient-to-b from-white to-cream">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h1 class="font-serif text-5xl md:text-6xl text-[#1a1a1a] mb-4">Gallery Art Shop</h1>
                <p class="text-[#555] text-lg max-w-2xl mx-auto">Bring the magic home with museum-quality prints from our most iconic shoots</p>
            </div>
        </section>

        <!-- Filter Bar -->
        <section class="py-8 bg-white border-y border-border-tan">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex flex-wrap items-center justify-center gap-3">
                    <button class="px-6 py-2 rounded-full text-sm uppercase tracking-wider transition-all duration-300 cursor-pointer whitespace-nowrap bg-brand-teal text-white">All</button>
                    <button class="px-6 py-2 rounded-full text-sm uppercase tracking-wider transition-all duration-300 cursor-pointer whitespace-nowrap bg-cream text-[#555] hover:bg-brand-orange hover:text-white">Editorial</button>
                    <button class="px-6 py-2 rounded-full text-sm uppercase tracking-wider transition-all duration-300 cursor-pointer whitespace-nowrap bg-cream text-[#555] hover:bg-brand-orange hover:text-white">Steampunk</button>
                    <button class="px-6 py-2 rounded-full text-sm uppercase tracking-wider transition-all duration-300 cursor-pointer whitespace-nowrap bg-cream text-[#555] hover:bg-brand-orange hover:text-white">Fantasy</button>
                    <button class="px-6 py-2 rounded-full text-sm uppercase tracking-wider transition-all duration-300 cursor-pointer whitespace-nowrap bg-cream text-[#555] hover:bg-brand-orange hover:text-white">Conceptual</button>
                </div>
            </div>
        </section>

        <!-- Products Grid -->
        <section class="py-16">
            <div class="max-w-7xl mx-auto px-6">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                    
                    <!-- Product: Victorian Romance -->
                    <div class="group bg-white rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-teal transition-all duration-300">
                        <div class="relative w-full h-80 overflow-hidden">
                            <img alt="Victorian Romance" class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" src="images/shop-light-image-1.jpg">
                            <div class="absolute top-3 right-3">
                                <span class="px-3 py-1 bg-brand-orange text-white text-xs uppercase tracking-wider rounded-full">Steampunk</span>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-serif text-xl text-[#1a1a1a] mb-3">Victorian Romance</h3>
                            <div class="mb-4">
                                <label class="block text-[#555] text-xs uppercase tracking-wider mb-2">Select Size</label>
                                <select class="w-full px-3 py-2 bg-cream border border-border-tan rounded-lg text-[#1a1a1a] text-sm focus:outline-none focus:ring-2 focus:ring-brand-teal cursor-pointer">
                                    <option value="8x10">8x10 - $45</option>
                                </select>
                            </div>
                            <button class="w-full px-4 py-3 bg-brand-teal text-white rounded-lg text-sm uppercase tracking-wider hover:bg-brand-orange transition-colors duration-300 cursor-pointer whitespace-nowrap">Add to Cart</button>
                        </div>
                    </div>



                </div>
            </div>
        </section>
    </div>

    <script>
        // Add to Cart functionality
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent.includes('Add to Cart')) {
                button.addEventListener('click', function() {
                    const productName = this.closest('.group').querySelector('h3').textContent;
                    const size = this.closest('.group').querySelector('select').value;
                    const price = this.closest('.group').querySelector('select').selectedOptions[0].text.split('-')[1].trim();
                    
                    alert(`Added to cart:\n${productName}\nSize: ${size}\nPrice: ${price}`);
                    
                    // Visual feedback
                    this.textContent = 'Added!';
                    this.classList.add('bg-brand-orange');
                    setTimeout(() => {
                        this.textContent = 'Add to Cart';
                        this.classList.remove('bg-brand-orange');
                    }, 2000);
                });
            }
        });

        // Filter buttons functionality
        document.querySelectorAll('button').forEach(button => {
            if (['All', 'Editorial', 'Steampunk', 'Fantasy', 'Conceptual'].includes(button.textContent)) {
                button.addEventListener('click', function() {
                    // Reset all buttons
                    document.querySelectorAll('button').forEach(btn => {
                        if (['All', 'Editorial', 'Steampunk', 'Fantasy', 'Conceptual'].includes(btn.textContent)) {
                            btn.classList.remove('bg-brand-teal', 'text-white');
                            btn.classList.add('bg-cream', 'text-[#555]');
                        }
                    });
                    
                    // Set active button
                    this.classList.remove('bg-cream', 'text-[#555]');
                    this.classList.add('bg-brand-teal', 'text-white');
                    
                    // Filter logic would go here
                    const category = this.textContent;
                    console.log('Filter by:', category);
                });
            }
        });

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeMenuBtn = document.getElementById('close-menu');
        const mobileMenuLinks = mobileMenu.querySelectorAll('nav a');

        function toggleMenu() {
            mobileMenu.classList.toggle('translate-x-full');
            document.body.classList.toggle('overflow-hidden');
        }

        mobileMenuBtn.addEventListener('click', toggleMenu);
        closeMenuBtn.addEventListener('click', toggleMenu);

        mobileMenuLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('translate-x-full');
                document.body.classList.remove('overflow-hidden');
            });
        });
    </script>
</body>
</html>
